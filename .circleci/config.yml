version: 2
jobs:
 build:
   machine:
      image: default
   steps:
     - checkout 

     # build image
     # --provenance=false --sbom=false stop buildx from attaching attestations.
     # With attestations the image becomes an OCI image index (manifest list),
     # which the Heroku Container Registry rejects with
     # "error from registry: unsupported". Disabling them (plus --load and a
     # single --platform) yields a plain Docker v2 schema 2 manifest Heroku accepts.
     - run: |
         docker info
         docker buildx build \
           --platform linux/amd64 \
           --provenance=false \
           --sbom=false \
           --load \
           -t aspnetapp -f GrammarNazi.App/Dockerfile .
     # deploy the image
     - run: |         
         docker login --username=$HEROKU_USERNAME --password=$HEROKU_API_KEY registry.heroku.com
         docker tag aspnetapp registry.heroku.com/$HEROKU_APP_NAME/web
         docker push registry.heroku.com/$HEROKU_APP_NAME/web                
         curl https://cli-assets.heroku.com/install.sh | sh
         heroku container:release web -a $HEROKU_APP_NAME

workflows:
  version: 2
  main:
    jobs:
    - build:
        filters:
          branches:
            only: master
